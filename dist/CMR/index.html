define({id: "840db104", inputs: ["d3","dfiFull","countryISO","display","html"], outputs: ["latestYear","countryData","country"], body: (d3,dfiFull,countryISO,display,html) => {
// latest year
const latestYear = d3.max(dfiFull, (d) => d.year);
// Find country by ISO3 code
const countryData = dfiFull.find((d) => d.ISO3_CODE === countryISO);
const country = countryData ? countryData.NAME_ENGL : "";

// If no country found, show error
if (!country) {
  display(
    html`<div class="hero">
      <h1>Country not found</h1>
      <p>The country code "${countryISO}" does not exist.</p>
    </div>`,
  );
}
return {latestYear,countryData,country};
}});

define({id: "c70ca122", inputs: ["dfiFull","country","latestYear","dfiCardinal"], outputs: ["dfiCountry","dfiLatest","dfiCardinalCountry"], body: (dfiFull,country,latestYear,dfiCardinal) => {
const dfiCountry = dfiFull.find(
  (d) => d.NAME_ENGL === country && d.year === latestYear,
);
const dfiLatest = dfiFull.filter((d) => d.year === latestYear);
const dfiCardinalCountry = dfiCardinal.filter(
  (d) => d.NAME_ENGL == country && d.year == latestYear,
);
return {dfiCountry,dfiLatest,dfiCardinalCountry};
}});
